
name: "早间要闻 0900"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京时间 09:00

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python main.py --schedule-index 0

      - name: Commit updated data
        run: |
          git config user.name "digest-bot"
          git config user.email "bot@digest.local"
          git add data/seen_urls.json archive/
          git diff --staged --quiet || git commit -m "daily digest $(date +%Y-%m-%d) 09:00"
          git push
